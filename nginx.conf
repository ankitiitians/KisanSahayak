# ============================================================
# KisanSahayak — Nginx Reverse Proxy Configuration
# Listens on port 80, proxies to the Node.js app on port 5000
# For HTTPS: add ssl_certificate blocks and listen 443 ssl
# ============================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    access_log  /var/log/nginx/access.log;
    error_log   /var/log/nginx/error.log warn;

    # Performance
    sendfile        on;
    keepalive_timeout 65;
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript text/xml application/xml;

    # Hide Nginx version from response headers
    server_tokens   off;

    # Rate limiting — protect API from abuse (100 req/s per IP)
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;

    upstream kisansahayak_backend {
        server app:5000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options        "SAMEORIGIN"   always;
        add_header X-XSS-Protection       "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff"       always;
        add_header Referrer-Policy        "no-referrer-when-downgrade" always;

        # Proxy all traffic to the Node.js backend
        location / {
            limit_req zone=api burst=20 nodelay;

            proxy_pass         http://kisansahayak_backend;
            proxy_http_version 1.1;

            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # Health check endpoint — used by load balancers
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }
}
