apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  namespace: kisansahayak
  annotations:
    # Re-run this job on each deploy by changing the suffix
    "helm.sh/hook": post-install,post-upgrade
spec:
  ttlSecondsAfterFinished: 120
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.35
          command:
            - sh
            - -c
            - |
              until nc -z postgres-service 5432; do
                echo "Waiting for postgres...";
                sleep 3;
              done
      containers:
        - name: migrate
          image: YOUR_DOCKERHUB_USERNAME/kisansahayak:latest   # ← same image, runs db:push
          command: ["npm", "run", "db:push"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: kisansahayak-secrets
                  key: DATABASE_URL
