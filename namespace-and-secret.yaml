# ============================================================
# KisanSahayak — Namespace + Secret template
# IMPORTANT: Is file mein apne real values daalo before applying
# Apply: kubectl apply -f k8s/namespace-and-secret.yaml
# ============================================================

apiVersion: v1
kind: Namespace
metadata:
  name: kisansahayak

---
# NOTE: Ye ek template hai — values ko base64 mein encode karo
# echo -n "yourvalue" | base64
apiVersion: v1
kind: Secret
metadata:
  name: kisansahayak-secret
  namespace: kisansahayak
type: Opaque
data:
  # echo -n "kisan" | base64
  POSTGRES_USER: a2lzYW4=
  # echo -n "yourStrongPassword" | base64  <-- apna password daalo
  POSTGRES_PASSWORD: eW91clN0cm9uZ1Bhc3N3b3Jk
  # echo -n "kisansahayak" | base64
  POSTGRES_DB: a2lzYW5zYWhhYWs=
  # echo -n "your64CharRandomSecret" | base64  <-- apna secret daalo
  SESSION_SECRET: eW91cjY0Q2hhclJhbmRvbVNlY3JldA==
  # echo -n "postgresql://kisan:yourStrongPassword@postgres-service:5432/kisansahayak" | base64
  DATABASE_URL: cG9zdGdyZXNxbDovL2tpc2FuOnlvdXJTdHJvbmdQYXNzd29yZEBwb3N0Z3Jlcy1zZXJ2aWNlOjU0MzIva2lzYW5zYWhhYWs=
