version: "3.9"

services:

  # ── PostgreSQL 16 ─────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: kisansahayak_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kisan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-kisansahayak}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kisan} -d ${POSTGRES_DB:-kisansahayak}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m

  # ── DB Migration (one-shot) ────────────────────────────────
  # Runs drizzle-kit push once after DB is healthy, then exits.
  # The app service waits for this to complete before starting.
  db-migrate:
    image: ${DOCKER_IMAGE:-kisansahayak:latest}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kisansahayak_migrate
    restart: "no"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-kisan}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-kisansahayak}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    command: ["npx", "drizzle-kit", "push"]

  # ── Application ────────────────────────────────────────────
  app:
    image: ${DOCKER_IMAGE:-kisansahayak:latest}
    container_name: kisansahayak_app
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://${POSTGRES_USER:-kisan}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-kisansahayak}
      SESSION_SECRET: ${SESSION_SECRET:-change_this_in_production}
    depends_on:
      db:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 512m

  # ── Nginx Reverse Proxy ────────────────────────────────────
  # Sits in front of the app, handles HTTP on port 80.
  # Swap the nginx.conf for HTTPS / SSL termination in production.
  nginx:
    image: nginx:1.27-alpine
    container_name: kisansahayak_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
