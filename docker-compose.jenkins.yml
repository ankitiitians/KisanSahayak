# ============================================================
# Jenkins + Docker-in-Docker setup
# Run this on your CI server / VM — separate from the app.
#
# Usage:
#   docker compose -f jenkins/docker-compose.jenkins.yml up -d
#   Open http://<your-server>:8080 to configure Jenkins
# ============================================================

version: "3.9"

services:

  # ── Jenkins Controller ──────────────────────────────────
  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: kisansahayak_jenkins
    restart: unless-stopped
    user: root                           # required to access Docker socket
    ports:
      - "8080:8080"                      # Jenkins web UI
      - "50000:50000"                    # agent communication port
    environment:
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=false"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock    # Docker-in-Docker via socket
      - ./jenkins-casc.yaml:/var/jenkins_home/casc_configs/casc.yaml:ro
    deploy:
      resources:
        limits:
          memory: 2g

  # ── Jenkins Agent ───────────────────────────────────────
  # Offloads build work from the controller.
  # Add more agents by duplicating this block.
  jenkins-agent:
    image: jenkins/inbound-agent:latest
    container_name: kisansahayak_jenkins_agent
    restart: unless-stopped
    environment:
      JENKINS_URL: http://jenkins:8080
      JENKINS_AGENT_NAME: agent-1
      JENKINS_SECRET: ${JENKINS_AGENT_SECRET}
      JENKINS_AGENT_WORKDIR: /home/jenkins/agent
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - jenkins

volumes:
  jenkins_home:
    driver: local
