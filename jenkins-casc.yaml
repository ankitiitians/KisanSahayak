# ============================================================
# Jenkins Configuration as Code (JCasC)
# Automatically configures Jenkins on first boot.
# Plugin required: configuration-as-code
# ============================================================

jenkins:
  systemMessage: "KisanSahayak CI/CD — Jenkins"
  numExecutors: 2
  mode: NORMAL

  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "admin"
          password: "${JENKINS_ADMIN_PASSWORD}"   # set in .env

  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

credentials:
  system:
    domainCredentials:
      - credentials:
          - usernamePassword:
              id: "dockerhub-credentials"
              username: "${DOCKERHUB_USERNAME}"
              password: "${DOCKERHUB_TOKEN}"
              description: "DockerHub credentials for KisanSahayak"

unclassified:
  location:
    url: "http://localhost:8080/"

tool:
  git:
    installations:
      - name: "Default"
        home: "git"
