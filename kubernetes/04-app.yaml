apiVersion: apps/v1
kind: Deployment
metadata:
  name: kisansahayak
  namespace: kisansahayak
  labels:
    app: kisansahayak
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kisansahayak
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: kisansahayak
    spec:
      # Wait for postgres to be ready before starting app
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.35
          command:
            - sh
            - -c
            - |
              until nc -z postgres-service 5432; do
                echo "Waiting for postgres...";
                sleep 3;
              done;
              echo "Postgres is ready!"
      containers:
        - name: kisansahayak
          image: YOUR_DOCKERHUB_USERNAME/kisansahayak:latest   # ← Jenkins will replace this
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "5000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: kisansahayak-secrets
                  key: DATABASE_URL
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: kisansahayak-secrets
                  key: SESSION_SECRET
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: kisansahayak-service
  namespace: kisansahayak
spec:
  selector:
    app: kisansahayak
  type: NodePort
  ports:
    - port: 80
      targetPort: 5000
      nodePort: 30500
